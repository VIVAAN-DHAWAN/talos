stages:
  - build
  - test
  - dark-matter
  - panic

variables:
  NODE_VERSION: "20"

# Prevent duplicate pipelines: when an MR is open, run the merge_request
# pipeline and skip the redundant branch pipeline. Also allow default-branch
# pushes, schedules, and external triggers.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

default:
  image: node:${NODE_VERSION}

build:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - npm ci || npm install
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

# Pre-Flight smoke tests. Boot the built app headless and verify it responds.
# A failure here blocks the MR (cue to trigger the Fix Pipeline agent).
smoke-tests:
  stage: test
  image: mcr.microsoft.com/playwright:v1.45.0-jammy
  needs: ["build"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - npm ci || npm install
    - npm run build
    - npx playwright install --with-deps chromium
    - npm run test:e2e
  artifacts:
    when: always
    paths:
      - playwright-report/
    expire_in: 7 days

# Runs only on scheduled pipelines with DARK_MATTER=1.
# Create a schedule under Build > Pipeline schedules with that variable set.
dark-matter:
  stage: dark-matter
  image: node:${NODE_VERSION}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $DARK_MATTER == "1"'
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends jq git curl
    - npm ci || npm install
  script:
    - bash .gitlab/dark-matter/run.sh
    - bash .gitlab/dark-matter/open-mr.sh
  artifacts:
    when: always
    paths:
      - .dark-matter/
    expire_in: 7 days

# Panic-Button: opens an automated revert MR when triggered by an external
# alert (e.g. Sentry) via the pipeline trigger API with PANIC=1.
panic-button:
  stage: panic
  image: node:${NODE_VERSION}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $PANIC == "1"'
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends jq git curl
  script:
    - bash .gitlab/panic-button/revert.sh
  artifacts:
    when: always
    paths:
      - panic_mr_response.json
    expire_in: 7 days
